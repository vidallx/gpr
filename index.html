        <!-- INTERFASE 2: PROGRAMADOR DE RUTINAS -->
        <section id="programmer-section" class="interface hidden">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin: 0;">Programar Rutina</h2>
                    <div style="display: flex; gap: 8px;">
                        <button onclick="showScheduledRoutines()" style="width: auto; padding: 8px 12px; font-size: 13px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer;">📅 Mis Rutinas</button>
                        <button onclick="showInterface('history-section'); loadHistory();" style="width: auto; padding: 8px 12px; font-size: 13px; background: #0C047D; color: white; border: none; border-radius: 8px; cursor: pointer;">📜 Historial</button>
                    </div>
                </div>

                <!-- 🆕 NUEVO: Selector de día para la rutina -->
                <div class="form-group" style="background: #f0f4f8; padding: 12px; border-radius: 10px; margin-bottom: 15px;">
                    <label style="font-weight: bold; color: #0C047D;">📅 Programar para el día:</label>
                    <select id="routine-day" style="margin-top: 8px;">
                        <option value="Lunes">Lunes</option>
                        <option value="Martes">Martes</option>
                        <option value="Miércoles">Miércoles</option>
                        <option value="Jueves">Jueves</option>
                        <option value="Viernes">Viernes</option>
                        <option value="Sábado">Sábado</option>
                        <option value="Domingo">Domingo</option>
                    </select>
                    <p id="routine-day-info" style="font-size: 12px; color: #666; margin-top: 5px; margin-bottom: 0;"></p>
                </div>
                
                <div class="form-group">
                    <label>Tipo de Entrenamiento:</label>
                    <select id="body-part">
                        <option value="Tren Superior">Tren Superior</option>
                        <option value="Tren Inferior">Tren Inferior</option>
                        <option value="Full Body">Full Body</option>
                    </select>
                </div>
                
                <div class="exercise-inputs">
                    <input type="text" id="ex-name" placeholder="Nombre del ejercicio (ej: Press de banca)">
                    <div class="row">
                        <input type="number" id="ex-sets" placeholder="Series" min="1">
                        <input type="number" id="ex-reps" placeholder="Repeticiones" min="1">
                        <input type="number" id="ex-weight" placeholder="Peso (kg)" min="0">
                    </div>
                    
                    <p class="sub-title">Equipamiento y Cantidad:</p>
                    <div class="row">
                        <select id="ex-equipment" style="flex: 2;">
                            <option value="Sin equipo" selected>Sin equipo</option>
                            <option value="Mancuernas">Mancuernas</option>
                            <option value="Barras">Barras</option>
                            <option value="Pesas rusas">Pesas rusas</option>
                            <option value="Discos">Discos</option>
                            <option value="Bolas medicinales">Bolas medicinales</option>
                            <option value="Máquinas de poleas y cables">Máquinas de poleas y cables</option>
                            <option value="Máquinas de peso guiado">Máquinas de peso guiado</option>
                            <option value="Bandas de resistencia">Bandas de resistencia</option>
                            <option value="Bancos de entrenamiento">Bancos de entrenamiento</option>
                        </select>
                        <select id="ex-quantity" style="flex: 1;" disabled>
                            <option value="2">2 (Simultáneo)</option>
                            <option value="1">1 (Unilateral)</option>
                        </select>
                    </div>

                    <p class="sub-title">Tempo (segundos):</p>
                    <div class="row">
                        <input type="number" id="tempo-ecc" placeholder="Excéntrico" min="0">
                        <input type="number" id="tempo-pb" placeholder="Pausa Abajo" min="0">
                        <input type="number" id="tempo-con" placeholder="Concéntrico" min="0">
                        <input type="number" id="tempo-pt" placeholder="Pausa Arriba" min="0">
                    </div>
                    <p class="sub-title">Descansos (segundos):</p>
                    <div class="row">
                        <input type="number" id="rest-set" placeholder="Entre Series" min="0">
                        <input type="number" id="rest-ex" placeholder="Entre Ejercicios" min="0">
                    </div>
                    <button class="secondary" onclick="addExercise()">Añadir Ejercicio</button>
                </div>

                <div id="routine-summary" class="summary-box">
                    <p>Tiempo total estimado: <span id="total-time-display" style="font-weight: bold; font-size: 1.2em;">00:00</span></p>
                    <ul id="exercise-list"></ul>
                </div>

                <div class="row" style="margin-top: 10px;">
                    <button class="primary-btn" onclick="saveAndStartRoutine()" style="flex: 1;">💾 Guardar e Iniciar</button>
                    <button class="secondary" onclick="saveRoutineOnly()" style="flex: 1; background: #28a745; color: white;">📥 Solo Guardar</button>
                </div>
            </div>
        </section>

        <!-- 🆕 NUEVA INTERFASE: PANEL DE RUTINAS PROGRAMADAS -->
        <section id="scheduled-routines-section" class="interface hidden">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin: 0;">📅 Mis Rutinas</h2>
                    <button onclick="showInterface('programmer-section')" style="width: auto; padding: 8px 15px; font-size: 14px; background: #e0e0e0; border: none; border-radius: 8px; cursor: pointer;">⬅ Volver</button>
                </div>
                <p style="color: #666; font-size: 14px; margin-bottom: 15px;">Tus rutinas programadas para cada día de la semana:</p>
                <div id="scheduled-routines-list"></div>
            </div>
        </section>
